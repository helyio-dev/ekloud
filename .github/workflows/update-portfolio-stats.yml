name: portfolio stats
on:
  push:
    branches: [ main ] 

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10 

      - name: calculate sloc
        id: sloc
        run: |
          pnpm dlx sloc src/ --format json > full-stats.json
          
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('full-stats.json', 'utf8'));
            const summary = {
              physical: data.summary.total.physical,
              source: data.summary.total.source,
              comment: data.summary.total.comment,
              files: data.summary.total.files,
              updated_at: new Date().toISOString()
            };
            fs.writeFileSync('ekloud-stats.json', JSON.stringify(summary, null, 2));
          "

      - name: update gist
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          gh gist edit $GIST_ID ekloud-stats.json