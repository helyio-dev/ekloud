name: portfolio stats
on:
  push:
    branches: [ main ] 

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10 

      - name: calculate sloc
        run: |
          pnpm dlx sloc src/ --format json > raw-stats.json
          
          node -e "
            const fs = require('fs');
            try {
              const raw = JSON.parse(fs.readFileSync('raw-stats.json', 'utf8'));
              const total = raw.summary?.total || raw.total || {};
              
              const summary = {
                physical: total.physical || 0,
                source: total.source || 0,
                comment: total.comment || 0,
                files: total.files || 0,
                updated_at: new Date().toISOString()
              };
              
              if (summary.source === 0) throw new Error('Données vides');
              
              fs.writeFileSync('ekloud-stats.json', JSON.stringify(summary, null, 2));
            } catch (err) {
              console.error(err);
              process.exit(1);
            }
          "

      - name: update gist
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          gh gist edit $GIST_ID ekloud-stats.json