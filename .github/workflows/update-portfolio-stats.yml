name: portfolio stats
on:
  push:
    branches: [ main ] 

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10 

      - name: calculate sloc
        run: |
          pnpm dlx sloc src/ --format json > raw-stats.json
          
          node -e "
            const fs = require('fs');
            const raw = JSON.parse(fs.readFileSync('raw-stats.json', 'utf8'));
            const summary = {
              physical: raw.summary.total.physical,
              source: raw.summary.total.source,
              comment: raw.summary.total.comment,
              files: raw.summary.total.files,
              updated_at: new Date().toISOString()
            };
            fs.writeFileSync('ekloud-stats.json', JSON.stringify(summary, null, 2));
          "

      - name: update gist
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          gh gist edit $GIST_ID ekloud-stats.json