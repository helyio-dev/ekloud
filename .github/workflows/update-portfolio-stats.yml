name: portfolio stats
on:
  push:
    branches: [ main ] 

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10 

      - name: calculate sloc
        run: |
          pnpm dlx sloc . --exclude "node_modules|.git|.next" --extensions "ts,tsx,js,jsx,css,scss" --format json > raw-stats.json
          
          node -e "
            const fs = require('fs');
            try {
              const raw = JSON.parse(fs.readFileSync('raw-stats.json', 'utf8'));
              
              const stats = raw.summary?.total || raw.total || (Array.isArray(raw) ? raw[0].total : null);
              
              if (!stats || stats.physical === 0) {
                 console.log('SLOC n a rien trouvé, vérification manuelle...');
              }

              const summary = {
                physical: stats?.physical || 0,
                source: stats?.source || 0,
                comment: stats?.comment || 0,
                files: stats?.files || 0,
                updated_at: new Date().toISOString()
              };

              fs.writeFileSync('ekloud-stats.json', JSON.stringify(summary, null, 2));
              console.log('Exportation :', summary);
            } catch (err) {
              console.error(err);
              process.exit(1);
            }
          "

      - name: update gist
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          gh gist edit $GIST_ID ekloud-stats.json